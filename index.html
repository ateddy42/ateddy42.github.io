<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="description" content="Teddy Heidmann — Principal Engineer at Workday (Revenue Center). Cornell M.Eng (AI)." />
	<title>Teddy Heidmann</title>
	<link rel="icon" href="favicon.ico" type="image/png" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
	<style>
		:root {
			color-scheme: light dark;
			--bg: #d4d4d8;
			--chrome: #e4e4e7;
			--chrome-border: #a1a1aa;
			--surface: #fafafa;
			--surface-border: #d4d4d8;
			--text: #18181b;
			--text-muted: #52525b;
			--accent: #1d4ed8;
			--accent-hover: #1e40af;
			--dot-red: #ef4444;
			--dot-amber: #eab308;
			--dot-green: #22c55e;
			--font: "IBM Plex Mono", ui-monospace, monospace;
			--radius: 10px;
			--shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
		}

		@media (prefers-color-scheme: dark) {
			:root {
				--bg: #09090b;
				--chrome: #27272a;
				--chrome-border: #3f3f46;
				--surface: #18181b;
				--surface-border: #3f3f46;
				--text: #f4f4f5;
				--text-muted: #a1a1aa;
				--accent: #60a5fa;
				--accent-hover: #93c5fd;
				--shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
			}
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: var(--font);
			font-size: 0.9375rem;
			line-height: 1.65;
			color: var(--text);
			background: var(--bg);
			-webkit-font-smoothing: antialiased;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: clamp(1rem, 4vw, 2.5rem);
		}

		a {
			color: var(--accent);
			text-decoration: underline;
			text-underline-offset: 3px;
			font-weight: 500;
		}

		a:hover {
			color: var(--accent-hover);
		}

		a:focus-visible {
			outline: 2px solid var(--accent);
			outline-offset: 3px;
			border-radius: 2px;
		}

		.skip-link {
			position: fixed;
			left: -9999px;
			top: 1rem;
			padding: 0.5rem 0.85rem;
			background: var(--surface);
			color: var(--text);
			border: 1px solid var(--surface-border);
			border-radius: var(--radius);
			z-index: 100;
		}

		.skip-link:focus {
			left: 1rem;
		}

		.window {
			width: 100%;
			max-width: 34rem;
			border: 1px solid var(--chrome-border);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			overflow: hidden;
			background: var(--chrome);
		}

		.window__titlebar {
			display: grid;
			grid-template-columns: 1fr auto 1fr;
			align-items: center;
			padding: 0.65rem 1rem;
			border-bottom: 1px solid var(--chrome-border);
			font-size: 0.75rem;
			font-weight: 500;
			color: var(--text-muted);
			user-select: none;
		}

		.window__dots {
			display: flex;
			gap: 0.35rem;
			grid-column: 1;
			justify-self: start;
		}

		.window__dots span {
			width: 10px;
			height: 10px;
			border-radius: 50%;
		}

		.window__dots span:nth-child(1) {
			background: var(--dot-red);
		}

		.window__dots span:nth-child(2) {
			background: var(--dot-amber);
		}

		.window__dots span:nth-child(3) {
			background: var(--dot-green);
		}

		.window__filename {
			justify-self: center;
			text-align: center;
			font-size: 0.72rem;
			letter-spacing: 0.02em;
			grid-column: 2;
		}

		.window__body {
			background: var(--surface);
			padding: clamp(1.35rem, 4vw, 1.85rem) clamp(1.15rem, 4vw, 1.65rem) clamp(1.5rem, 4vw, 1.85rem);
			border-top: 1px solid var(--surface-border);
		}

		.window__body h1 {
			margin: 0 0 1rem;
			font-size: clamp(1.35rem, 3.5vw, 1.6rem);
			font-weight: 600;
			line-height: 1.25;
			letter-spacing: -0.03em;
		}

		.window__body .comment {
			margin: 0 0 1.15rem;
			color: var(--text-muted);
			font-style: italic;
			font-weight: 400;
			font-size: 0.88rem;
			line-height: 1.55;
		}

		.window__body .comment::before {
			content: "// ";
			font-style: normal;
			opacity: 0.7;
		}

		.bio {
			margin: 0;
			color: var(--text-muted);
			font-size: 0.88rem;
			line-height: 1.65;
			text-wrap: pretty;
		}

		.links {
			margin-top: 1.35rem;
			padding-top: 1.15rem;
			border-top: 1px dashed var(--surface-border);
			font-size: 0.82rem;
			color: var(--text-muted);
		}

		.links__row {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 0.25rem 0.15rem;
		}

		.links a {
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			min-width: 2.5rem;
			min-height: 2.5rem;
			padding: 0.35rem;
			border-radius: 6px;
			color: var(--accent);
		}

		.links a:hover {
			color: var(--accent-hover);
			background: color-mix(in srgb, var(--accent) 8%, transparent);
		}

		.links a svg {
			width: 1.35rem;
			height: 1.35rem;
			flex-shrink: 0;
		}
	</style>
</head>
<body>
	<a class="skip-link" href="#main">Skip to content</a>
	<article class="window" aria-label="Profile">
		<div class="window__titlebar">
			<div class="window__dots" aria-hidden="true">
				<span></span><span></span><span></span>
			</div>
			<span class="window__filename">readme.md</span>
		</div>
		<div class="window__body">
			<h1 id="main">Teddy Heidmann</h1>
			<p class="comment">Principal Engineer @ Workday, Cornell M.Eng (AI)</p>
			<p class="bio">Currently building the future of financial systems within Revenue&nbsp;Center at Workday. Based in Pleasanton, CA, with a long-standing passion for computer science and intelligent systems.</p>

				</div>
			</nav>
		</div>
	</article>
</body>
